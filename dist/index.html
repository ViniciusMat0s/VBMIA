<!doctype html>
<html lang="es-ES">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Landing premium en React + Tailwind para vender un pack de prompts de IA para crear imágenes en distintos nichos."
    />
    <script>
      (() => {
        const storageKey = "vbm-theme";

        try {
          const storedTheme = localStorage.getItem(storageKey);
          const preferredTheme =
            storedTheme === "dark" || storedTheme === "light"
              ? storedTheme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";

          document.documentElement.dataset.theme = preferredTheme;
          document.documentElement.style.colorScheme = preferredTheme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <title>VBM IA | Prompts de IA para múltiples nichos</title>
    <script type="module" crossorigin src="/assets/index-DiXvqajW.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CZrxK3xj.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
